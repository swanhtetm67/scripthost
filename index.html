<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptCDN | Fast Lua Hosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">ScriptCDN</h1>
        <div class="space-x-6">
            <a href="/" class="hover:text-blue-400 transition">Upload</a>
            <a href="/dashboard" class="hover:text-blue-400 transition">My Scripts</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-12 p-6">
        <div class="glass-card p-8 rounded-2xl border border-white/10">
            <h2 class="text-3xl font-bold mb-2">Upload Lua Script</h2>
            <p class="text-slate-400 mb-8">Get a permanent raw link for your loadstrings.</p>
            
            <form id="uploadForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Script Title</label>
                    <input type="text" name="title" required placeholder="My Awesome Hub" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Lua Content</label>
                    <textarea name="content" required rows="10" placeholder="print('Hello World!')" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-blue-500 transition font-mono text-sm"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition flex items-center justify-center gap-2">
                    <i data-lucide="upload"></i> Deploy to CDN
                </button>
            </form>
        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 translate-y-20 opacity-0 transition-all duration-300 bg-emerald-500 text-white px-6 py-3 rounded-xl shadow-lg"></div>

    <script src="/static/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
