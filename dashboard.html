<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ScriptCDN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">ScriptCDN</h1>
        <div class="space-x-6">
            <a href="/" class="hover:text-blue-400 transition">Upload</a>
            <a href="/dashboard" class="hover:text-blue-400 transition">My Scripts</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 p-6">
        <h2 class="text-2xl font-bold mb-6">Your Hosted Scripts</h2>
        <div id="scriptGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 translate-y-20 opacity-0 transition-all duration-300 bg-blue-500 text-white px-6 py-3 rounded-xl shadow-lg"></div>

    <script src="/static/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadScripts);
    </script>
</body>
</html>
